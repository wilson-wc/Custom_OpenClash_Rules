;Custom_OpenClash_Rules (Modified for Chain Proxy)
;基于 Aethersailor 模板魔改，新增“前置节点 + 链式美国家里”支持
;作者：Gemini Adaptive AI
;项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules

[custom]
; --- 优先级最高：强制链式代理规则 (Claude & 出口检测) ---
; 将这些规则放在最上方，确保它们在命中原模板规则前生效
ruleset=🏠 链式-美国家里,[]DOMAIN-SUFFIX,claude.ai
ruleset=🏠 链式-美国家里,[]DOMAIN-SUFFIX,anthropic.com
ruleset=🏠 链式-美国家里,[]DOMAIN-SUFFIX,ip.me
ruleset=🏠 链式-美国家里,[]DOMAIN-SUFFIX,ifconfig.me
ruleset=🏠 链式-美国家里,[]DOMAIN-SUFFIX,icanhazip.com
ruleset=🏠 链式-美国家里,[]DOMAIN-SUFFIX,dnsleaktest.com
ruleset=🏠 链式-美国家里,[]DOMAIN-SUFFIX,browserleaks.com
ruleset=🏠 链式-美国家里,[]DOMAIN-KEYWORD,ipcheck

